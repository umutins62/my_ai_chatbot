name: Update README with Screenshots

on:
  workflow_run:
    workflows: ["Build and Deploy"]
    types:
      - completed

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Upload Screenshot 1
        uses: actions/upload-artifact@v2
        with:
          name: screenshot1
          path: path/to/screenshot1.png

      - name: Upload Screenshot 2
        uses: actions/upload-artifact@v2
        with:
          name: screenshot2
          path: path/to/screenshot2.png
